<!DOCTYPE html>
<html>
<head>
    <title>{% if form.instance.pk %}Edit{% else %}New{% endif %} Repair Request</title>
</head>
<body>
    <h1>{% if form.instance.pk %}Edit{% else %}New{% endif %} Repair Request</h1>
    <p><a href="{% url 'repairrequest-list' %}">&larr; Back to Requests</a></p>

    <form method="post">
        {% csrf_token %}
        <table>
            {{ form.as_table }}
        </table>
        <br>
        <button type="submit">{% if form.instance.pk %}Update{% else %}Submit{% endif %}</button>
    </form>
</body>
</html>
