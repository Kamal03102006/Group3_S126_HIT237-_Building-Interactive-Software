<!DOCTYPE html>
<html>
<head>
    <title>Houses</title>
</head>
<body>
    <h1>Available Houses</h1>

    {% for house in houses %}
        <p>{{ house }}</p>
    {% empty %}
        <p>No houses available.</p>
    {% endfor %}
    <h1>Available Houses</h1>

    {% for house in houses %}
    <p>{{ house.location }} (Capacity: {{ house.capacity }})</p>
    {% empty %}
    <p>No houses available</p>
    {% endfor %}
</body>
</html>
