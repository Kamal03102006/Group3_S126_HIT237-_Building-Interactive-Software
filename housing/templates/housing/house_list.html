<!DOCTYPE html>
<html>
<head>
    <title>Houses</title>
</head>
<body>
    <h1>Available Houses</h1>
    <p><a href="{% url 'repairrequest-list' %}">View Repair Requests</a></p>

    <table border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th>House Code</th>
                <th>Address</th>
                <th>Community</th>
                <th>Bedrooms</th>
                <th>Condition</th>
            </tr>
        </thead>
        <tbody>
            {% for house in houses %}
            <tr>
                <td>{{ house.house_code }}</td>
                <td>{{ house.address }}</td>
                <td>{{ house.community }}</td>
                <td>{{ house.bedrooms }}</td>
                <td>{{ house.condition_status }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5">No houses available.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
