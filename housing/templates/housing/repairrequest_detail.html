<!DOCTYPE html>
<html>
<head>
    <title>Requests</title>
</head>
<body>
    <h1>Pending Requests</h1>

    {% for request in requests %}
        <p>{{ request }}</p>
    {% empty %}
        <p>No pending requests.</p>
    {% endfor %}
    <h1>Available Houses</h1>

    {% for house in houses %}
    <p>{{ house.location }} (Capacity: {{ house.capacity }})</p>
    {% empty %}
    <p>No houses available</p>
    {% endfor %}
</body>
</html>
