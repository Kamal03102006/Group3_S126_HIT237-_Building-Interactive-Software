<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Remote Housing Crisis{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
            color: #222;
        }

        header {
            background: #1f4e79;
            color: white;
            padding: 18px 30px;
        }

        header h1 {
            margin: 0;
            font-size: 26px;
        }

        nav {
            margin-top: 8px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 18px;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        h2, h3 {
            color: #1f4e79;
        }

        .card {
            border: 1px solid #ddd;
            border-left: 5px solid #1f4e79;
            padding: 16px;
            margin-bottom: 18px;
            border-radius: 8px;
            background: #fafafa;
        }

        .meta {
            color: #666;
            font-size: 14px;
            margin-top: 6px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            margin-right: 8px;
        }

        .priority-low { background: #d9edf7; color: #31708f; }
        .priority-medium { background: #fcf8e3; color: #8a6d3b; }
        .priority-high { background: #f2dede; color: #a94442; }
        .priority-urgent { background: #d9534f; color: white; }

        .status-reported { background: #e7f3fe; color: #0c5460; }
        .status-in_progress { background: #fff3cd; color: #856404; }
        .status-on_hold { background: #f8d7da; color: #721c24; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-cancelled { background: #e2e3e5; color: #383d41; }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            background: #1f4e79;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 10px;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #163a5c;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #545b62;
        }

        .empty {
            padding: 20px;
            background: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 8px;
        }

        .messages {
            margin-bottom: 20px;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            background: #d4edda;
            color: #155724;
        }

        form label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        form input,
        form select,
        form textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .filter-box {
            margin-bottom: 25px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        footer {
            text-align: center;
            padding: 16px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Remote Housing Repair Tracker</h1>
        <nav>
            <a href="{% url 'repairrequest-list' %}">All Requests</a>
            <a href="{% url 'repairrequest-create' %}">Submit Request</a>
        </nav>
    </header>

    <div class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <footer>
        Group Project - Remote Housing Crisis App
    </footer>
</body>
</html>
